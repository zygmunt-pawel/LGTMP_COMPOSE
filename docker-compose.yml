name: lgtmp

# Grafana LGTMP storage stack:
#   L oki       — logs
#   G rafana    — UI
#   T empo      — traces
#   M imir      — metrics
#   + Pyroscope — profiles
#
# This stack is purely the storage/query layer. There is **no alloy here** —
# alloy belongs next to your application, see the alloy_host_agent repo:
#   https://github.com/zygmunt-pawel/alloy_host_agent
#
# Each backend exposes the port your alloy_host_agent (or any OTel-compliant
# pusher) needs to write into. Apps DO NOT push directly to these ports;
# they push to a local alloy_host_agent which forwards here.
#
# Endpoints exposed on the host (point alloy_host_agent at these):
#   - Loki      :3100 — OTLP HTTP at /otlp/v1/logs (also LogQL queries)
#   - Tempo     :4317 — OTLP gRPC for span ingestion
#               :3200 — TraceQL queries (used by Grafana datasource)
#   - Mimir     :9009 — Prometheus push API at /api/v1/push
#                       and OTLP HTTP at /otlp/v1/metrics
#   - Pyroscope :4040 — native HTTP push for profiles
#   - Grafana   :3001 — UI (anonymous Admin in dev — see README)

services:
  loki:
    image: grafana/loki:latest
    container_name: lgtmp-loki
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  tempo:
    # 2.9.2 (stable release from 2026-03-27) instead of :latest, because :latest
    # pulls bleeding-edge mainline where the local_blocks processor was removed
    # (PR #6555, March 2026). Drilldown Traces requires local_blocks for TraceQL
    # Metrics, so we pin to the last stable release that still has it.
    image: grafana/tempo:2.9.2
    container_name: lgtmp-tempo
    command: -config.file=/etc/tempo/tempo-config.yml
    ports:
      - "3200:3200"  # query API
      - "4317:4317"  # OTLP gRPC ingestion (alloy_host_agent or any OTel pusher)
      - "4318:4318"  # OTLP HTTP ingestion (HTTP-only OTel clients)
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo

  mimir:
    image: grafana/mimir:2.13.0
    container_name: lgtmp-mimir
    command: -config.file=/etc/mimir/mimir-config.yml
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir-config.yml:/etc/mimir/mimir-config.yml:ro
      - mimir-data:/var/mimir

  pyroscope:
    image: grafana/pyroscope:latest
    container_name: lgtmp-pyroscope
    # Retention is set via CLI flag rather than the YAML config — Pyroscope
    # :latest doesn't accept retention under `pyroscopedb`.
    command: -config.file=/etc/pyroscope/pyroscope-config.yml -compactor.blocks-retention-period=168h
    ports:
      - "4040:4040"
    volumes:
      - ./pyroscope/pyroscope-config.yml:/etc/pyroscope/pyroscope-config.yml:ro
      # The Pyroscope image declares VOLUME /data in its Dockerfile — mount on
      # /data, not on a custom path, otherwise the non-root pyroscope user
      # can't write into a root-owned mount and ingest fails with HTTP 422.
      - pyroscope-data:/data

  grafana:
    image: grafana/grafana:latest
    container_name: lgtmp-grafana
    ports:
      - "3001:3000"
    environment:
      # DEV ONLY — anonymous Admin so you don't need to log in. For any
      # exposed deployment (LAN/internet), remove these and configure proper
      # auth (basic/OAuth/LDAP). See README "Production hardening".
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_FEATURE_TOGGLES_ENABLE=logsExploreTableVisualisation,logsInfiniteScrolling,lokiLogsDataplane
      - GF_INSTALL_PLUGINS=grafana-lokiexplore-app,grafana-exploretraces-app
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_started
      tempo:
        condition: service_started
      mimir:
        condition: service_started
      pyroscope:
        condition: service_started

volumes:
  loki-data:
  tempo-data:
  grafana-data:
  mimir-data:
  pyroscope-data:
