auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  metric_aggregation_enabled: true
  allow_structured_metadata: true
  volume_enabled: true
  # Global retention — applies to all logs that don't match a retention_stream below.
  retention_period: 720h  # 30 days

  # Per-stream retention (commented out — enable to vary retention by level/service)
  # retention_stream:
  #   - selector: '{severity_text=~"ERROR|WARN"}'
  #     priority: 1
  #     period: 960h   # 40 days for error/warn
  #   - selector: '{severity_text="INFO"}'
  #     priority: 2
  #     period: 480h   # 20 days for info

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://localhost:9093

# Pattern ingester — Drain algorithm for the Patterns view in Drilldown.
# Drain detects a pattern only when the log body has >=4 tokens, so descriptive
# log messages emit cleaner patterns.
# Patterns are stored in-memory and are ephemeral (~3h retention).
# Endpoint: GET /loki/api/v1/patterns?query=...&start=...&end=...&step=60s
# (step is actually required to get data back when auth_enabled: false).
pattern_ingester:
  enabled: true
  metric_aggregation:
    loki_address: loki:3100
  # From Loki troubleshooting docs: pattern_ingester only supports
  # replication_factor=1. The global common.replication_factor isn't enough —
  # the explicit ring config below prevents "empty ring" errors that appear
  # in SSD / microservices deployments.
  lifecycler:
    ring:
      replication_factor: 1
